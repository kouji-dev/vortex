# Isolated stack for Playwright / manual E2E. Does not touch local-dev volumes.
#
# Usage (infrastructure only — API and frontend run on the host):
#   docker compose -f docker-compose.e2e.yml up -d
#   ./scripts/e2e-up.sh          # migrate + seed + start API on :8001
#   cd frontend && pnpm e2e      # run Playwright
#
# Ports used (all 127.0.0.1 only, no clash with local-dev):
#   5435  — Postgres (ai_portal_e2e database)
#   8001  — FastAPI backend (host process, see scripts/e2e-up.sh)
name: local-e2e

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: local-e2e-ai-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_portal_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - ai-portal-e2e-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_portal_e2e"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  ai-portal-e2e-db-data:

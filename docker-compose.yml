# Compose project name = local-dev (Docker Compose "namespace" for networks/volumes).
# Layout copied from kouji-factory/docker-compose.yml (db + redis, alpine images, env vars).
# Differences for ai-portal:
#   - pgvector image so `CREATE EXTENSION vector` works for RAG (kouji uses postgres:17-alpine).
#   - Distinct container_name + host ports (5434 / 6380) so this stack can run alongside
#     kouji-factory on the same machine (kouji uses local-dev-db on 5433 and redis on 6379).

name: local-dev

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: local-dev-ai-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ai-portal-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: local-dev-ai-portal-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - ai-portal-redis-data:/data

  api:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-dev-ai-portal-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_portal
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:3000
      DEV_BEARER_TOKEN: devtoken
      DEV_SEED_USER_EMAIL: dev@localhost
      UPLOAD_DIR: /app/data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ai-portal-uploads:/app/data/uploads
    depends_on:
      - db
      - redis

  worker:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-dev-ai-portal-worker
    restart: unless-stopped
    command: ["celery", "-A", "ai_portal.worker", "worker", "-l", "info"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_portal
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ai-portal-uploads:/app/data/uploads
    depends_on:
      - db
      - redis

  web:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: local-dev-ai-portal-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - api

  # Optional: `docker compose --profile litellm up -d litellm` then point OPENAI_API_BASE at http://litellm:4000/v1
  litellm:
    profiles: ["litellm"]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: local-dev-ai-portal-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-changeme}

volumes:
  ai-portal-db-data:
  ai-portal-redis-data:
  ai-portal-uploads:

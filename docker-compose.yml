# Compose project name = local-dev (Docker Compose "namespace" for networks/volumes).
# Layout copied from kouji-factory/docker-compose.yml (db + redis, alpine images, env vars).
# Differences for ai-portal:
#   - pgvector image so `CREATE EXTENSION vector` works for RAG (kouji uses postgres:17-alpine).
#   - Distinct container_name + host ports (5434 / 6380) so this stack can run alongside
#     kouji-factory on the same machine (kouji uses local-dev-db on 5433 and redis on 6379).
#
# What starts by default:
#   `docker compose up -d`  →  db + redis only (useful when API and web run on the host, e.g. pnpm dev + uvicorn).
#
# Backend + frontend in Docker (API http://127.0.0.1:8000, web http://127.0.0.1:3000):
#   `docker compose --profile full up -d --build`

name: local-dev

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: local-dev-ai-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ai-portal-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: local-dev-ai-portal-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - ai-portal-redis-data:/data

  api:
    profiles: ["full"]
    build:
      context: ./server/api
      dockerfile: Dockerfile
    container_name: local-dev-ai-portal-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_portal
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:3000
      DEV_BEARER_TOKEN: devtoken
      DEV_SEED_USER_EMAIL: dev@localhost
      UPLOAD_DIR: /app/data/uploads
      CHAT_DEFAULT_API_MODEL: ${CHAT_DEFAULT_API_MODEL:-claude-haiku-4-5-20251001}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      PORTAL_API_KEY_PEPPER: ${PORTAL_API_KEY_PEPPER:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-voyage-4-lite}
    volumes:
      - ai-portal-uploads:/app/data/uploads
    depends_on:
      - db

  web:
    profiles: ["full"]
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: local-dev-ai-portal-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - api

volumes:
  ai-portal-db-data:
  ai-portal-redis-data:
  ai-portal-uploads:

  .vx-disp{font-family:var(--vx-font-display);letter-spacing:-.03em;}

  @keyframes vx-pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes vx-shimmer{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

  @keyframes vx-toastin{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
  @keyframes vx-drawin{from{transform:translateX(100%);}to{transform:none;}}
  @keyframes vx-blink{0%,100%{opacity:1;}50%{opacity:0;}}

  [data-density="compact"] .vx-table td{padding:5px 12px !important;}
  [data-density="compact"] .vx-table th{padding:5px 12px !important;}
  [data-density="comfortable"] .vx-table td{padding:11px 14px !important;}
  [data-density="comfortable"] .vx-table th{padding:9px 14px !important;}
  [data-density="comfortable"] .vx-side-item{min-height:32px !important;}
  .vx-navitem-collapsed span.lbl,.vx-navitem-collapsed span.cnt{display:none !important;}
</style>

  get NAV(){
    return [
      {group:'Platform', items:[

  // ============================================================
  //  FORMAT / BADGES
  // ============================================================
  money(n,d=2){ return '$'+n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
  compact(n){ return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':''+n; }
  roleTone(r){ return {owner:'pink',admin:'accent',member:'blue',team_admin:'accent',app_admin:'accent',app_member:'neutral'}[r]||'neutral'; }
  provColor(p){ return {anthropic:'var(--vx-prov-anthropic)',openai:'var(--vx-prov-openai)',google:'var(--vx-prov-google)',mistral:'var(--vx-prov-mistral)',meta:'#4267b2'}[p]||'var(--vx-ink-4)'; }
  provLetter(p){ return {anthropic:'A',openai:'O',google:'G',mistral:'M',meta:'L'}[p]||'?'; }
  pmark(p,size=16){ const V=window.Vortex_469485;
    if(p==='meta') return React.createElement('span',{style:{width:size,height:size,borderRadius:3,display:'grid',placeItems:'center',fontWeight:700,fontSize:Math.round(size*0.6),color:'#fff',fontFamily:'var(--vx-font-mono)',flexShrink:0,background:'#4267b2'}},'L');

  mtype(t){ const V=window.Vortex_469485; return t==='technical'

    : React.createElement(V.Tag,{tone:'neutral'},'Human'); }
  appKind(k){ const V=window.Vortex_469485; const map={system:['accent','System'],service:['blue','Service'],personal:['neutral','Personal']}; const[t,l]=map[k]||['neutral',k]; return React.createElement(V.Badge,{tone:t},l); }
  roleBadge(r){ const V=window.Vortex_469485; return React.createElement(V.Badge,{tone:this.roleTone(r)}, r[0].toUpperCase()+r.slice(1)); }

  // ============================================================
  //  CHART BUILDERS
  // ============================================================
  svg(html,style){ return React.createElement('div',{style:{...style},dangerouslySetInnerHTML:{__html:html}}); }
  areaChart(series,opts={}){
    const w=opts.w||760,h=opts.h||220,pad={l:44,r:12,t:14,b:26};
    const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
    const all=series.flatMap(s=>s.data); const mx=opts.max||Math.max(...all)*1.1,mn=0;
    const n=series[0].data.length;
    const X=i=>pad.l+i/(n-1)*iw, Y=v=>pad.t+ih-((v-mn)/(mx-mn))*ih;
    let grid='';
    for(let g=0;g<=4;g++){ const y=pad.t+ih-g/4*ih; const val=mn+(mx-mn)*g/4;
      grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--vx-line)" stroke-width="1"/><text x="${pad.l-8}" y="${y+3}" text-anchor="end" font-size="9" font-family="var(--vx-font-mono)" fill="var(--vx-ink-4)">${opts.fmt?opts.fmt(val):Math.round(val)}</text>`; }
    let xl=''; (opts.labels||[]).forEach((l,i)=>{ if(l) xl+=`<text x="${X(i)}" y="${h-8}" text-anchor="middle" font-size="9" font-family="var(--vx-font-mono)" fill="var(--vx-ink-4)">${l}</text>`; });
    let paths='';
    series.forEach((s,si)=>{ const id='ar'+si+Math.floor(Math.random()*1e5);
      const line=s.data.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
      const area=line+`L${X(n-1)} ${pad.t+ih}L${X(0)} ${pad.t+ih}Z`;
      paths+=`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${s.color}" stop-opacity=".2"/><stop offset="1" stop-color="${s.color}" stop-opacity="0"/></linearGradient></defs>`;
      if(s.fill!==false) paths+=`<path d="${area}" fill="url(#${id})"/>`;
      paths+=`<path d="${line}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`; });
    return this.svg(`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;overflow:visible">${grid}${xl}${paths}</svg>`);
  }
  donut(segs,size=148){
    const r=size/2-14,cx=size/2,cy=size/2,C=2*Math.PI*r; const tot=segs.reduce((a,s)=>a+s.v,0);
    let off=0,arcs='';
    segs.forEach(s=>{ const len=s.v/tot*C; arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=len; });
    return this.svg(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="20" font-family="var(--vx-font-display)" font-weight="600" fill="var(--vx-ink)">${tot>=1000?this.compact(tot):tot}</text><text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="9" font-family="var(--vx-font-mono)" fill="var(--vx-ink-4)">TOTAL</text></svg>`);
  }
  gauge(frac,size=130,label='OF BUDGET'){
    const r=size/2-9,cx=size/2,cy=size/2,C=2*Math.PI*r; const len=Math.min(frac,1)*C*.75, full=C*.75;
    const col=frac>=.95?'var(--vx-err)':frac>=.8?'var(--vx-warn)':'var(--vx-good)';
    return this.svg(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--vx-bg-2)" stroke-width="9" stroke-dasharray="${full} ${C}" stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="9" stroke-dasharray="${len} ${C}" stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"/><text x="${cx}" y="${cy}" text-anchor="middle" font-size="21" font-family="var(--vx-font-display)" font-weight="600" fill="var(--vx-ink)">${Math.round(frac*100)}%</text><text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="8.5" font-family="var(--vx-font-mono)" fill="var(--vx-ink-4)">${label}</text></svg>`);
  }
  gridbars(rows,fmt){
    const mx=Math.max(...rows.map(r=>r.v));
    return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      rows.map((r,i)=>React.createElement('div',{key:i,style:{display:'grid',gridTemplateColumns:'132px 1fr 76px',alignItems:'center',gap:12,fontSize:12}},
        React.createElement('span',{style:{display:'flex',alignItems:'center',gap:7,color:'var(--vx-ink-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, r.mark||null, r.label),
        React.createElement('div',{style:{height:9,borderRadius:6,background:'var(--vx-bg-2)',overflow:'hidden'}}, React.createElement('div',{style:{height:'100%',width:(r.v/mx*100).toFixed(1)+'%',borderRadius:6,background:r.color||'var(--vx-accent)'}})),
        React.createElement('span',{style:{textAlign:'right',fontFamily:'var(--vx-font-mono)',fontSize:11.5,color:'var(--vx-ink)'}}, fmt?fmt(r.v):r.v)
      )));
  }
  costSeries(total,seed,n=30){ let s=(Math.abs(Math.round(seed))*9301+49297)%233280||7; const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};
    const base=total/n, trend=0.7+rnd()*0.8, arr=[];
    for(let i=0;i<n;i++){ const wob=1+Math.sin(i/3+seed)*0.26+(rnd()-0.5)*0.3, grow=1+(i/(n-1))*(trend-1); arr.push(Math.max(base*0.12, base*wob*grow)); }
    return arr; }
  stackedArea(series,opts={}){
    const w=opts.w||760,h=opts.h||200,pad={l:46,r:12,t:14,b:26},iw=w-pad.l-pad.r,ih=h-pad.t-pad.b,n=series[0].data.length;
    const totals=series[0].data.map((_,i)=>series.reduce((a,s)=>a+s.data[i],0)), mx=(opts.max||Math.max(...totals)*1.14),mn=0;
    const X=i=>pad.l+i/(n-1)*iw, Y=v=>pad.t+ih-((v-mn)/(mx-mn))*ih;
    let grid=''; for(let g=0;g<=4;g++){ const y=pad.t+ih-g/4*ih,val=mn+(mx-mn)*g/4; grid+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--vx-line)" stroke-width="1"/><text x="${pad.l-8}" y="${y+3}" text-anchor="end" font-size="9" font-family="var(--vx-font-mono)" fill="var(--vx-ink-4)">${opts.fmt?opts.fmt(val):Math.round(val)}</text>`; }
    let xl=''; (opts.labels||[]).forEach((l,i)=>{ if(l) xl+=`<text x="${X(i)}" y="${h-8}" text-anchor="middle" font-size="9" font-family="var(--vx-font-mono)" fill="var(--vx-ink-4)">${l}</text>`; });
    let paths=''; const lower=series[0].data.map(()=>0);
    series.forEach(s=>{ const top=lower.map((b,i)=>b+s.data[i]); let d='M'+X(0).toFixed(1)+' '+Y(top[0]).toFixed(1); for(let i=1;i<n;i++) d+=' L'+X(i).toFixed(1)+' '+Y(top[i]).toFixed(1); for(let i=n-1;i>=0;i--) d+=' L'+X(i).toFixed(1)+' '+Y(lower[i]).toFixed(1); d+=' Z'; paths+=`<path d="${d}" fill="${s.color}" fill-opacity="0.9" stroke="var(--vx-panel)" stroke-width="0.6"/>`; for(let i=0;i<n;i++) lower[i]=top[i]; });
    return this.svg(`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;overflow:visible">${grid}${xl}${paths}</svg>`);
  }
  legend(items){ return items.map(([l,c])=>React.createElement('span',{key:l,style:{display:'flex',alignItems:'center',gap:6,fontSize:11.5,color:'var(--vx-ink-2)'}}, React.createElement('span',{style:{width:9,height:9,borderRadius:3,background:c}}), l)); }

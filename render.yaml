services:
  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: ai-portal-api
    runtime: docker
    dockerfilePath: ./server/api/Dockerfile
    dockerContext: ./server/api
    plan: starter
    envVars:
      - key: DEPLOYMENT_MODE
        value: saas
      - key: DATABASE_URL
        sync: false          # Supabase / Render Postgres connection string
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ORIGINS
        sync: false          # e.g. https://app.yourdomain.com
      - key: EMAIL_FROM
        sync: false          # e.g. noreply@yourdomain.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # ── Social OAuth (GitHub) ──────────────────────────────────────────
      - key: SOCIAL_GITHUB_CLIENT_ID
        sync: false          # From GitHub OAuth App settings
      - key: SOCIAL_GITHUB_CLIENT_SECRET
        sync: false
      # ── Social OAuth (Google) ─────────────────────────────────────────
      - key: SOCIAL_GOOGLE_CLIENT_ID
        sync: false          # From Google Cloud Console OAuth 2.0 credentials
      - key: SOCIAL_GOOGLE_CLIENT_SECRET
        sync: false
      # ── Social provider list (comma-separated) ────────────────────────
      - key: AUTH_SOCIAL_PROVIDERS
        value: "github,google"    # enables social login buttons; must match configured credentials
      # ── Frontend origin for OAuth redirect-back ───────────────────────
      - key: FRONTEND_URL
        sync: false          # e.g. https://ai-portal-app.onrender.com

  # ── Frontend App ─────────────────────────────────────────────────────────
  - type: web
    name: ai-portal-app
    runtime: node
    rootDir: apps/frontend
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm run start
    plan: starter
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://ai-portal-api.onrender.com
      - key: NODE_VERSION
        value: "20"

  # ── Landing Page ─────────────────────────────────────────────────────────
  - type: web
    name: ai-portal-landing
    runtime: node
    buildCommand: cd apps/landing && npm install -g pnpm && pnpm install && pnpm run build
    startCommand: cd apps/landing && pnpx srvx --prod -s ../client dist/server/server.js
    plan: free
    region: frankfurt
    envVars:
      - key: VITE_APP_URL
        sync: false          # e.g. https://ai-portal-app.onrender.com
      - key: NODE_VERSION
        value: "20"

  # ── Docs ──────────────────────────────────────────────────────────────────
  - type: static
    name: ai-portal-docs
    buildCommand: cd apps/docs && npm install -g pnpm && pnpm install && pnpm run build
    staticPublishPath: apps/docs/out
    envVars:
      - key: NODE_VERSION
        value: "20"

packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
minimumReleaseAgeExclude:
  - '@kouji-ui/components@0.4.3'
  - '@kouji-ui/core@0.2.0'
onlyBuiltDependencies:
  - esbuild
  - '@parcel/watcher'
  - lmdb
  - msgpackr-extract
